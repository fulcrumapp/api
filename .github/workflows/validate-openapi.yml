name: Validate OpenAPI

on:
  pull_request:
    paths:
      - '.github/workflows/validate-openapi.yml'
      - 'reference/rest-api.json'
  push:
    branches:
      - v2
    paths:
      - '.github/workflows/validate-openapi.yml'
      - 'reference/rest-api.json'

jobs:
  validate:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON syntax
        working-directory: reference
        run: |
          node -e "
            const fs = require('fs');
            try {
              JSON.parse(fs.readFileSync('rest-api.json', 'utf-8'));
              console.log('✅ Valid JSON');
            } catch (e) {
              console.error('❌ Invalid JSON:', e.message);
              process.exit(1);
            }
          "

      - name: Check for RAW_BODY anti-patterns
        working-directory: reference
        run: |
          count=$(grep -c "RAW_BODY" rest-api.json || true)
          if [ "$count" -gt 0 ]; then
            echo "❌ Found $count RAW_BODY anti-pattern(s) in rest-api.json"
            grep -n "RAW_BODY" rest-api.json
            exit 1
          fi
          echo "✅ No RAW_BODY anti-patterns found"

      - name: Check for external schema references
        working-directory: reference
        run: |
          count=$(grep -cF '"./components/schemas' rest-api.json || true)
          if [ "$count" -gt 0 ]; then
            echo "❌ Found $count external \$ref path(s) — ReadMe does not support external file references"
            grep -nF '"./components/schemas' rest-api.json
            exit 1
          fi
          echo "✅ No external \$ref paths found"

      - name: Validate OpenAPI spec (rdme)
        working-directory: reference
        run: npx --yes rdme openapi validate rest-api.json
